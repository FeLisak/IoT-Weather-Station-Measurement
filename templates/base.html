<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Estação Meteorológica{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">Estação IoT</a>
    <div class="navbar-links">
      <a href="/" class="{{ 'active' if request.path == '/' }}">Painel</a>
      <a href="/historico" class="{{ 'active' if request.path == '/historico' }}">Histórico</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
