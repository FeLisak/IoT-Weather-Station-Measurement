{% extends "base.html" %}
{% block title %}Editar Leitura #{{ leitura.id }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Editar Leitura <span class="muted">#{{ leitura.id }}</span></h1>
  <a href="/historico" class="btn btn-secondary">← Voltar</a>
</div>

<div class="form-card">
  <div class="form-meta">
    <span>Registrado em: {{ leitura.timestamp }}</span>
  </div>

  <form id="formEditar">
    <div class="form-group">
      <label for="temperatura_externa">Temperatura Externa (°C)</label>
      <input
        type="number"
        step="0.1"
        id="temperatura_externa"
        name="temperatura_externa"
        value="{{ leitura.temperatura_externa }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="umidade_do_solo">Umidade do Solo (0–1023)</label>
      <input
        type="number"
        step="1"
        id="umidade_do_solo"
        name="umidade_do_solo"
        value="{{ leitura.umidade_do_solo }}"
        required
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar alterações</button>
      <a href="/historico" class="btn btn-secondary">Cancelar</a>
    </div>

    <div id="formMsg" class="form-msg hidden"></div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('formEditar').addEventListener('submit', async (e) => {
    e.preventDefault();

    const dados = {
      temperatura_externa: parseFloat(document.getElementById('temperatura_externa').value),
      umidade_do_solo: parseFloat(document.getElementById('umidade_do_solo').value),
    };

    const msg = document.getElementById('formMsg');

    try {
      const res = await fetch('/leituras/{{ leitura.id }}', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dados),
      });

      if (res.ok) {
        msg.textContent = 'Leitura atualizada com sucesso!';
        msg.className = 'form-msg success';
        setTimeout(() => window.location.href = '/historico', 1200);
      } else {
        const erro = await res.json();
        msg.textContent = `Erro: ${erro.erro}`;
        msg.className = 'form-msg error';
      }
    } catch (e) {
      msg.textContent = 'Erro de comunicação com o servidor.';
      msg.className = 'form-msg error';
    }
  });
</script>
{% endblock %}
